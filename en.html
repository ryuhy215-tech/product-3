<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's for Dinner Tonight?</title>
  <style>
    * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }

    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      --container-bg: rgba(255,255,255,0.07);
      --container-border: rgba(255,255,255,0.12);
      --title-color: #ffdd57;
      --sub-color: #aaa;
      --cat-bg: rgba(255,255,255,0.08);
      --cat-border: rgba(255,255,255,0.25);
      --cat-color: #ccc;
      --cat-active-bg: rgba(255,221,87,0.22);
      --cat-active-border: #ffdd57;
      --cat-active-color: #ffdd57;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.1);
      --menu-name: #fff;
      --menu-desc: #aaa;
      --tag-bg: rgba(255,221,87,0.15);
      --tag-color: #ffdd57;
      --select-bg: rgba(255,255,255,0.08);
      --select-border: rgba(255,255,255,0.2);
      --select-color: #ccc;
      --select-opt-bg: #1a1a2e;
      --label-color: #aaa;
      --toggle-bg: rgba(255,255,255,0.1);
      --toggle-color: #ccc;
      --toggle-border: rgba(255,255,255,0.2);
      --input-bg: rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.15);
      --input-color: #eee;
      --input-placeholder: #777;
      --form-title: #ffdd57;
      --form-label: #bbb;
      --divider: rgba(255,255,255,0.1);
    }

    [data-theme="light"] {
      --bg: linear-gradient(135deg, #f5f0e8, #fde9c9, #ffd580);
      --container-bg: rgba(255,255,255,0.75);
      --container-border: rgba(0,0,0,0.08);
      --title-color: #c47d00;
      --sub-color: #666;
      --cat-bg: rgba(0,0,0,0.05);
      --cat-border: rgba(0,0,0,0.15);
      --cat-color: #555;
      --cat-active-bg: rgba(196,125,0,0.15);
      --cat-active-border: #c47d00;
      --cat-active-color: #c47d00;
      --card-bg: rgba(255,255,255,0.85);
      --card-border: rgba(0,0,0,0.08);
      --menu-name: #222;
      --menu-desc: #666;
      --tag-bg: rgba(196,125,0,0.12);
      --tag-color: #b36a00;
      --select-bg: rgba(255,255,255,0.8);
      --select-border: rgba(0,0,0,0.2);
      --select-color: #444;
      --select-opt-bg: #fff;
      --label-color: #555;
      --toggle-bg: rgba(0,0,0,0.06);
      --toggle-color: #555;
      --toggle-border: rgba(0,0,0,0.15);
      --input-bg: rgba(255,255,255,0.85);
      --input-border: rgba(0,0,0,0.15);
      --input-color: #222;
      --input-placeholder: #aaa;
      --form-title: #c47d00;
      --form-label: #555;
      --divider: rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      margin: 0;
      padding: 40px 0;
    }
    .container {
      background: var(--container-bg);
      border-radius: 24px;
      padding: 44px 40px;
      text-align: center;
      backdrop-filter: blur(12px);
      border: 1px solid var(--container-border);
      width: 460px;
      max-width: 95vw;
      position: relative;
    }

    /* Top-right controls */
    .top-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
    }
    .top-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      color: var(--toggle-color);
      border-radius: 50px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .top-btn:hover { opacity: 0.75; }

    h1 { color: var(--title-color); font-size: 2rem; margin-bottom: 6px; }
    p.sub { color: var(--sub-color); margin-bottom: 32px; font-size: 0.92rem; }

    .category-filter {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .cat-btn {
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid var(--cat-border);
      background: var(--cat-bg);
      color: var(--cat-color);
      font-size: 0.82rem;
      cursor: pointer;
      margin-top: 0;
      box-shadow: none;
    }
    .cat-btn:hover, .cat-btn.active {
      background: var(--cat-active-bg);
      border-color: var(--cat-active-border);
      color: var(--cat-active-color);
      transform: none;
      box-shadow: none;
    }
    #result-area {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }
    .menu-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 18px 24px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      text-align: left;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .menu-emoji { font-size: 2.4rem; flex-shrink: 0; }
    .menu-info  { flex: 1; }
    .menu-name  { color: var(--menu-name); font-size: 1.15rem; font-weight: bold; margin-bottom: 4px; }
    .menu-desc  { color: var(--menu-desc); font-size: 0.82rem; line-height: 1.4; }
    .menu-tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-color);
      border-radius: 50px;
      padding: 2px 10px;
      font-size: 0.75rem;
      margin-top: 6px;
    }
    select {
      background: var(--select-bg);
      border: 1px solid var(--select-border);
      color: var(--select-color);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 0.88rem;
      cursor: pointer;
      margin-bottom: 20px;
      outline: none;
    }
    select option { background: var(--select-opt-bg); }
    button#pickBtn {
      margin-top: 28px;
      padding: 14px 44px;
      background: linear-gradient(135deg, #f0a500, #ffdd57);
      color: #333;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(240,165,0,0.4);
    }
    button#pickBtn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(240,165,0,0.6); }
    button#pickBtn:active { transform: scale(0.97); }

    /* Partnership form */
    .form-section {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--divider);
      text-align: left;
    }
    .form-section h2 {
      color: var(--form-title);
      font-size: 1.1rem;
      margin-bottom: 6px;
      text-align: center;
    }
    .form-section p.form-sub {
      color: var(--sub-color);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
    }
    .form-group label { color: var(--form-label); font-size: 0.82rem; }
    .form-group input,
    .form-group textarea,
    .form-group select.form-select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--input-color);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      outline: none;
      width: 100%;
      font-family: inherit;
      resize: vertical;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--input-placeholder); }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--cat-active-border); }
    .form-group select.form-select { cursor: pointer; margin-bottom: 0; }
    .form-group select.form-select option { background: var(--select-opt-bg); }
    button#submitBtn {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      background: linear-gradient(135deg, #f0a500, #ffdd57);
      color: #333;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(240,165,0,0.4);
    }
    button#submitBtn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(240,165,0,0.6); }
    button#submitBtn:active { transform: scale(0.98); }
    .form-success {
      display: none;
      text-align: center;
      color: #4caf7d;
      font-size: 0.95rem;
      padding: 14px;
      border-radius: 10px;
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.25);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-controls">
      <a href="index.html" class="top-btn">🇰🇷 KO</a>
      <button class="top-btn" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
    </div>

    <h1>🍽️ What's for Dinner?</h1>
    <p class="sub">Pick a category and get a random dinner recommendation</p>

    <div class="category-filter">
      <button class="cat-btn active" onclick="setCategory(this,'all')">All</button>
      <button class="cat-btn" onclick="setCategory(this,'korean')">🇰🇷 Korean</button>
      <button class="cat-btn" onclick="setCategory(this,'chinese')">🥡 Chinese</button>
      <button class="cat-btn" onclick="setCategory(this,'japanese')">🍱 Japanese</button>
      <button class="cat-btn" onclick="setCategory(this,'western')">🍝 Western</button>
      <button class="cat-btn" onclick="setCategory(this,'snack')">🍜 Street Food</button>
    </div>

    <div style="margin-bottom:6px;">
      <label style="font-size:0.85rem;color:var(--label-color);">Suggestions &nbsp;</label>
      <select id="countSel">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="5">5</option>
      </select>
    </div>

    <div id="result-area"></div>
    <button id="pickBtn" onclick="pick()">🎲 Recommend a Dish</button>

    <!-- Partnership inquiry form -->
    <div class="form-section">
      <h2>🤝 Partnership Inquiry</h2>
      <p class="form-sub">Reach out for restaurant, brand, or advertising partnerships</p>

      <form id="contactForm" action="https://formspree.io/f/maqldnjl" method="POST">
        <div class="form-group">
          <label for="fname">Name / Company</label>
          <input type="text" id="fname" name="name" placeholder="John Doe / Tasty Restaurant Inc." required>
        </div>
        <div class="form-group">
          <label for="femail">Email</label>
          <input type="email" id="femail" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="ftype">Inquiry Type</label>
          <select id="ftype" name="type" class="form-select">
            <option value="Restaurant Partnership">Restaurant Partnership</option>
            <option value="Brand Partnership">Brand Partnership</option>
            <option value="Advertising">Advertising</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fmsg">Message</label>
          <textarea id="fmsg" name="message" rows="4" placeholder="Tell us about your inquiry..." required></textarea>
        </div>
        <button type="submit" id="submitBtn">✉️ Send Inquiry</button>
      </form>
      <div class="form-success" id="formSuccess">✅ Your message has been sent! We'll get back to you shortly.</div>
    </div>
  </div>

  <script>
    const MENUS = [
      { name:'Samgyeopsal',    cat:'korean',   emoji:'🥩', desc:'Grilled pork belly with lettuce wraps & doenjang stew',  tag:'Popular' },
      { name:'Kimchi Jjigae',  cat:'korean',   emoji:'🍲', desc:'Spicy kimchi stew with pork and tofu',                   tag:'Home Meal' },
      { name:'Doenjang Jjigae',cat:'korean',   emoji:'🥣', desc:'Savory fermented soybean paste stew with zucchini',      tag:'Home Meal' },
      { name:'Bulgogi',        cat:'korean',   emoji:'🍖', desc:'Sweet marinated beef over steamed rice',                  tag:'Korean' },
      { name:'Bibimbap',       cat:'korean',   emoji:'🥗', desc:'Colorful veggie rice bowl with gochujang sauce',          tag:'Healthy' },
      { name:'Sundubu Jjigae', cat:'korean',   emoji:'🍳', desc:'Silken tofu stew with seafood or pork',                  tag:'Home Meal' },
      { name:'Galbi-tang',     cat:'korean',   emoji:'🍜', desc:'Rich short rib bone broth soup',                         tag:'Nourishing' },
      { name:'Jeyuk Bokkeum',  cat:'korean',   emoji:'🥘', desc:'Spicy stir-fried pork with rice',                        tag:'Home Meal' },
      { name:'Dak Bokkeum-tang',cat:'korean',  emoji:'🍗', desc:'Braised spicy chicken with vegetables',                  tag:'Korean' },
      { name:'Jajangmyeon',    cat:'chinese',  emoji:'🍝', desc:'Noodles in savory black bean sauce with egg',             tag:'Chinese' },
      { name:'Jjamppong',      cat:'chinese',  emoji:'🦐', desc:'Spicy seafood noodle soup',                              tag:'Chinese' },
      { name:'Tangsuyuk',      cat:'chinese',  emoji:'🍖', desc:'Crispy sweet & sour pork (dip or pour — your call)',      tag:'Chinese' },
      { name:'Mapo Tofu',      cat:'chinese',  emoji:'🌶️', desc:'Spicy Sichuan-style tofu over rice',                    tag:'Chinese' },
      { name:'Fried Rice',     cat:'chinese',  emoji:'🍚', desc:'Chinese-style fried rice with egg, scallion & shrimp',   tag:'Quick' },
      { name:'Sushi',          cat:'japanese', emoji:'🍣', desc:'Fresh nigiri sushi set',                                  tag:'Japanese' },
      { name:'Ramen',          cat:'japanese', emoji:'🍜', desc:'Rich tonkotsu or shoyu ramen',                           tag:'Japanese' },
      { name:'Tonkatsu',       cat:'japanese', emoji:'🍱', desc:'Crispy pork cutlet with curry or sauce',                  tag:'Japanese' },
      { name:'Udon',           cat:'japanese', emoji:'🍜', desc:'Chewy thick noodles in warm dashi broth',                tag:'Japanese' },
      { name:'Gyudon',         cat:'japanese', emoji:'🥩', desc:'Tender beef & onion rice bowl',                          tag:'Japanese' },
      { name:'Pasta',          cat:'western',  emoji:'🍝', desc:'Aglio e olio or creamy fettuccine',                      tag:'Western' },
      { name:'Pizza',          cat:'western',  emoji:'🍕', desc:'Wood-fired or pan pizza, your choice',                   tag:'Western' },
      { name:'Steak',          cat:'western',  emoji:'🥩', desc:'Medium-rare sirloin steak',                              tag:'Special' },
      { name:'Burger',         cat:'western',  emoji:'🍔', desc:'Smash-patty burger with fries',                          tag:'Western' },
      { name:'Risotto',        cat:'western',  emoji:'🍚', desc:'Creamy mushroom risotto',                                tag:'Western' },
      { name:'Tteokbokki',     cat:'snack',    emoji:'🌶️', desc:'Spicy rice cakes with fish cake & fried snacks',        tag:'Street Food' },
      { name:'Rabokki',        cat:'snack',    emoji:'🍜', desc:'Ramen noodles in spicy tteokbokki sauce',                tag:'Street Food' },
      { name:'Gimbap',         cat:'snack',    emoji:'🍙', desc:'Korean rice rolls (tuna or cheese) + fish cake soup',    tag:'Street Food' },
      { name:'Jjolmyeon',      cat:'snack',    emoji:'🥗', desc:'Chewy noodles in sweet & spicy sauce with soft egg',     tag:'Street Food' },
      { name:'Sundae Gukbap',  cat:'snack',    emoji:'🍲', desc:'Blood sausage rice soup with thin noodles',              tag:'Street Food' },
    ];

    let currentCat = 'all';

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeBtn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
    }

    function setCategory(el, cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function pick() {
      const pool = currentCat === 'all' ? MENUS : MENUS.filter(m => m.cat === currentCat);
      const count = Math.min(parseInt(document.getElementById('countSel').value), pool.length);
      const picked = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
      const area = document.getElementById('result-area');
      area.innerHTML = '';
      picked.forEach((m, i) => {
        setTimeout(() => {
          area.innerHTML += `
            <div class="menu-card">
              <div class="menu-emoji">${m.emoji}</div>
              <div class="menu-info">
                <div class="menu-name">${m.name}</div>
                <div class="menu-desc">${m.desc}</div>
                <span class="menu-tag">${m.tag}</span>
              </div>
            </div>`;
        }, i * 120);
      });
    }

    pick();

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      try {
        const res = await fetch(this.action, {
          method: 'POST',
          body: new FormData(this),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          this.style.display = 'none';
          document.getElementById('formSuccess').style.display = 'block';
        } else {
          btn.textContent = '✉️ Send Inquiry';
          btn.disabled = false;
          alert('Failed to send. Please try again.');
        }
      } catch {
        btn.textContent = '✉️ Send Inquiry';
        btn.disabled = false;
        alert('Network error. Please check your connection.');
      }
    });
  </script>
</body>
</html>
