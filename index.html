<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 저녁 뭐 먹지?</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .container {
      background: rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 44px 40px;
      text-align: center;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      width: 460px;
      max-width: 95vw;
    }
    h1 {
      color: #ffdd57;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    p.sub {
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.92rem;
    }
    .category-filter {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .cat-btn {
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
      box-shadow: none;
    }
    .cat-btn:hover, .cat-btn.active {
      background: rgba(255,221,87,0.22);
      border-color: #ffdd57;
      color: #ffdd57;
      transform: none;
      box-shadow: none;
    }
    #result-area {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }
    .menu-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 18px 24px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      text-align: left;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .menu-emoji {
      font-size: 2.4rem;
      flex-shrink: 0;
    }
    .menu-info {
      flex: 1;
    }
    .menu-name {
      color: #fff;
      font-size: 1.15rem;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .menu-desc {
      color: #aaa;
      font-size: 0.82rem;
      line-height: 1.4;
    }
    .menu-tag {
      display: inline-block;
      background: rgba(255,221,87,0.15);
      color: #ffdd57;
      border-radius: 50px;
      padding: 2px 10px;
      font-size: 0.75rem;
      margin-top: 6px;
    }
    .pick-count {
      color: #888;
      font-size: 0.82rem;
      margin-bottom: 4px;
    }
    select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 0.88rem;
      cursor: pointer;
      margin-bottom: 20px;
      outline: none;
    }
    select option { background: #1a1a2e; }
    button#pickBtn {
      margin-top: 28px;
      padding: 14px 44px;
      background: linear-gradient(135deg, #f0a500, #ffdd57);
      color: #333;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(240,165,0,0.4);
    }
    button#pickBtn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(240,165,0,0.6); }
    button#pickBtn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍽️ 오늘 저녁 뭐 먹지?</h1>
    <p class="sub">카테고리를 고르고 랜덤 메뉴 추천을 받아보세요</p>

    <div class="category-filter">
      <button class="cat-btn active" data-cat="all" onclick="setCategory(this,'all')">전체</button>
      <button class="cat-btn" data-cat="korean" onclick="setCategory(this,'korean')">🇰🇷 한식</button>
      <button class="cat-btn" data-cat="chinese" onclick="setCategory(this,'chinese')">🥡 중식</button>
      <button class="cat-btn" data-cat="japanese" onclick="setCategory(this,'japanese')">🍱 일식</button>
      <button class="cat-btn" data-cat="western" onclick="setCategory(this,'western')">🍝 양식</button>
      <button class="cat-btn" data-cat="snack" onclick="setCategory(this,'snack')">🍜 분식</button>
    </div>

    <div style="margin-bottom:6px;">
      <label style="color:#aaa;font-size:0.85rem;">추천 개수 &nbsp;</label>
      <select id="countSel">
        <option value="1">1개</option>
        <option value="2">2개</option>
        <option value="3" selected>3개</option>
        <option value="5">5개</option>
      </select>
    </div>

    <div id="result-area"></div>

    <button id="pickBtn" onclick="pick()">🎲 메뉴 추천받기</button>
  </div>

  <script>
    const MENUS = [
      { name:'삼겹살', cat:'korean', emoji:'🥩', desc:'두툼한 삼겹살에 쌈 채소와 된장찌개', tag:'인기' },
      { name:'김치찌개', cat:'korean', emoji:'🍲', desc:'칼칼하고 깊은 맛의 돼지 김치찌개', tag:'집밥' },
      { name:'된장찌개', cat:'korean', emoji:'🥣', desc:'구수한 된장에 두부와 호박', tag:'집밥' },
      { name:'불고기', cat:'korean', emoji:'🍖', desc:'달콤한 양념 소불고기 덮밥', tag:'한식' },
      { name:'비빔밥', cat:'korean', emoji:'🥗', desc:'형형색색 나물과 고추장 비빔밥', tag:'건강식' },
      { name:'순두부찌개', cat:'korean', emoji:'🍳', desc:'보들보들 순두부에 해물 또는 돼지고기', tag:'집밥' },
      { name:'갈비탕', cat:'korean', emoji:'🍜', desc:'진하게 우린 소갈비탕', tag:'보양식' },
      { name:'제육볶음', cat:'korean', emoji:'🥘', desc:'매콤달콤 돼지고기 제육볶음 + 공기밥', tag:'집밥' },
      { name:'닭볶음탕', cat:'korean', emoji:'🍗', desc:'칼칼한 양념의 닭볶음탕', tag:'한식' },
      { name:'짜장면', cat:'chinese', emoji:'🍝', desc:'고소한 춘장 짜장에 달걀 후라이', tag:'중식' },
      { name:'짬뽕', cat:'chinese', emoji:'🦐', desc:'해물이 가득한 칼칼한 짬뽕', tag:'중식' },
      { name:'탕수육', cat:'chinese', emoji:'🍖', desc:'바삭한 탕수육 (부먹 or 찍먹 선택)', tag:'중식' },
      { name:'마파두부', cat:'chinese', emoji:'🌶️', desc:'매콤한 사천식 마파두부 덮밥', tag:'중식' },
      { name:'볶음밥', cat:'chinese', emoji:'🍚', desc:'파, 달걀, 새우가 들어간 중국식 볶음밥', tag:'간단' },
      { name:'초밥', cat:'japanese', emoji:'🍣', desc:'신선한 생선을 얹은 쥐어짠 초밥 세트', tag:'일식' },
      { name:'라멘', cat:'japanese', emoji:'🍜', desc:'진한 돈코츠 or 쇼유 라멘', tag:'일식' },
      { name:'돈가스', cat:'japanese', emoji:'🍱', desc:'바삭한 돈가스 + 카레 or 소스', tag:'일식' },
      { name:'우동', cat:'japanese', emoji:'🍜', desc:'쫄깃한 면발의 따뜻한 우동', tag:'일식' },
      { name:'규동', cat:'japanese', emoji:'🥩', desc:'달콤한 소고기 양파 규동 덮밥', tag:'일식' },
      { name:'파스타', cat:'western', emoji:'🍝', desc:'알리오올리오 or 크림 페투치네', tag:'양식' },
      { name:'피자', cat:'western', emoji:'🍕', desc:'화덕 or 도우 피자 한 판', tag:'양식' },
      { name:'스테이크', cat:'western', emoji:'🥩', desc:'미디엄 레어 채끝 스테이크', tag:'특식' },
      { name:'햄버거', cat:'western', emoji:'🍔', desc:'수제 패티 버거 + 감자튀김', tag:'양식' },
      { name:'리조또', cat:'western', emoji:'🍚', desc:'버섯 크림 리조또', tag:'양식' },
      { name:'떡볶이', cat:'snack', emoji:'🌶️', desc:'쫀득한 떡볶이 + 튀김 + 순대', tag:'분식' },
      { name:'라볶이', cat:'snack', emoji:'🍜', desc:'라면과 떡볶이의 황금 조합', tag:'분식' },
      { name:'김밥', cat:'snack', emoji:'🍙', desc:'참치 or 치즈 김밥 + 어묵국', tag:'분식' },
      { name:'쫄면', cat:'snack', emoji:'🥗', desc:'새콤달콤 쫄면 + 반숙 달걀', tag:'분식' },
      { name:'순대국밥', cat:'snack', emoji:'🍲', desc:'구수한 순대국밥에 소면 추가', tag:'분식' },
    ];

    let currentCat = 'all';

    function setCategory(el, cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function pick() {
      const pool = currentCat === 'all' ? MENUS : MENUS.filter(m => m.cat === currentCat);
      const count = Math.min(parseInt(document.getElementById('countSel').value), pool.length);
      const picked = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
      const area = document.getElementById('result-area');
      area.innerHTML = '';
      picked.forEach((m, i) => {
        setTimeout(() => {
          area.innerHTML += `
            <div class="menu-card">
              <div class="menu-emoji">${m.emoji}</div>
              <div class="menu-info">
                <div class="menu-name">${m.name}</div>
                <div class="menu-desc">${m.desc}</div>
                <span class="menu-tag">${m.tag}</span>
              </div>
            </div>`;
        }, i * 120);
      });
    }

    pick();
  </script>
</body>
</html>
